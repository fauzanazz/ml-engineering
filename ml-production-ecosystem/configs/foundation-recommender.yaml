pipeline:
  name: foundation-recommender
  version: foundation-config-v1

dataset:
  ratings_path: examples/samples/recommendation/ratings.csv
  movies_path: examples/samples/recommendation/movies.csv

model:
  type: popularity
  hyperparams:
    min_rating: 4.0

model_contract:
  input_schema_uri: schemas/recommendation/input.json
  output_schema_uri: schemas/recommendation/output.json
  task_type: ranking
  prediction_key: recommendations

artifacts:
  artifact_dir: artifacts/foundation

experiments:
  tracking_dir: artifacts/experiments/runs
  run_id: foundation-config-v1

registry:
  path: registry/models.json
  stage: candidate
  set_active: false

quality_gate:
  enabled: true
  metrics_path: artifacts/foundation/recommendation/foundation-config-v1/metrics.json
  minimums:
    candidate_count: 1
    ratings_rows: 1
