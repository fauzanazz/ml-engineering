service_name: foundation-api
image: ml-production-ecosystem-foundation-api
command: uv run foundation-serve-recommender --host 0.0.0.0 --port 8000 --prediction-log-path logs/production-compose-predictions.jsonl
port: 8000
health_endpoint: /health
metrics_endpoint: /metrics
metrics_json_endpoint: /metrics.json
drift_endpoint: /drift
registry_path: registry/models.json
release_checklist: docs/domains/production-patterns/release-checklist.md
rollback_command: >-
  uv run production-rollback-model
  --registry-path registry/models.json
  --model-name movielens-popularity
  --target-version foundation-config-v1
  --reason "deployment verification failed"
