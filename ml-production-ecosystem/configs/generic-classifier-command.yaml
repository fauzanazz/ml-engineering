pipeline:
  name: generic-classifier-command
  version: generic-classifier-v1

model_contract:
  input_schema_uri: schemas/generic_classifier/input.json
  output_schema_uri: schemas/generic_classifier/output.json
  task_type: classification
  prediction_key: label

training:
  type: command
  command:
    - python
    - examples/samples/generic_classifier/train.py
    - --data-path
    - examples/samples/generic_classifier/data.csv
    - --artifact-dir
    - artifacts/foundation
    - --summary-path
    - artifacts/reports/production-patterns/generic-classifier-training-summary.json
    - --version
    - generic-classifier-v1
  summary_path: artifacts/reports/production-patterns/generic-classifier-training-summary.json

registry:
  path: registry/models.json
  stage: candidate
  set_active: false

quality_gate:
  enabled: true
  metrics_path: artifacts/foundation/tiny-threshold-classifier/generic-classifier-v1/metrics.json
  minimums:
    accuracy: 0.8
