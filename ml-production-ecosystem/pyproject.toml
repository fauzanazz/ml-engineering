[project]
name = "ml-production-ecosystem"
version = "0.1.0"
description = "Shared MLOps learning architecture for production ML engineering stages."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "confluent-kafka>=2.5.0",
    "psycopg[binary]>=3.2.0",
    "PyYAML>=6.0.2",
]

[project.scripts]
foundation-prepare-data = "recommendation.data:main"
foundation-train-recommender = "recommendation.train:main"
foundation-train-from-config = "recommendation.train:config_main"
foundation-list-runs = "recommendation.train:list_runs_main"
foundation-recommend = "recommendation.predict:main"
foundation-rt-demo = "recommendation.rt_demo:main"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "01-foundation"]


[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["shared", "shared.deployment", "shared.model_storage", "shared.monitoring", "shared.observability", "recommendation"]
package-dir = {recommendation = "01-foundation/recommendation"}
