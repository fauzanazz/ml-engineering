name: served-model
version: 1
contract:
  required_variables:
    - project_name
    - package_name
    - preset
  entrypoints:
    test: uv run pytest
  generated_paths:
    - README.md
    - pyproject.toml
    - configs/project.yaml
    - data/README.md
    - docs/runbook.md
    - tests/test_scaffold.py
    - Dockerfile
    - "{{package_name}}/api.py"
    - "{{package_name}}/predict.py"
