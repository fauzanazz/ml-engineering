name: ML Production Ecosystem CI

on:
  push:
    paths:
      - 'ml-production-ecosystem/**'
      - '.github/workflows/ml-production-ecosystem-ci.yml'
  pull_request:
    paths:
      - 'ml-production-ecosystem/**'
      - '.github/workflows/ml-production-ecosystem-ci.yml'

jobs:
  production-patterns:
    name: Production patterns validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate production patterns
        run: |
          cd ml-production-ecosystem
          ./scripts/validate-production-patterns.sh
