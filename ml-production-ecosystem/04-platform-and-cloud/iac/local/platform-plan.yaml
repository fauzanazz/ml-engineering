provider: local
environment: development
resources:
  - kind: local-path
    name: model-artifacts
    uri: 01-foundation/models
  - kind: local-path
    name: prediction-logs
    uri: 01-foundation/logs
  - kind: local-path
    name: model-registry
    uri: 01-foundation/registry/models.json
secrets:
  - provider: local
    name: development/local/model-registry-token
    injection_target: LOCAL_MODEL_REGISTRY_TOKEN
    policy_ref: local-env-file-reference
