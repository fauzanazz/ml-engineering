pipeline:
  name: foundation-recommender
  version: foundation-config-v1

dataset:
  ratings_path: 01-foundation/data/raw/ml-25m/ratings.csv
  movies_path: 01-foundation/data/raw/ml-25m/movies.csv

model:
  type: popularity
  hyperparams:
    min_rating: 4.0

model_contract:
  input_schema_uri: schemas/recommendation/input.json
  output_schema_uri: schemas/recommendation/output.json
  task_type: ranking
  prediction_key: recommendations

artifacts:
  artifact_dir: 01-foundation/artifacts

experiments:
  tracking_dir: 01-foundation/experiments/runs
  run_id: foundation-config-v1

registry:
  path: 01-foundation/registry/models.json
  stage: candidate
  set_active: false

quality_gate:
  enabled: true
  metrics_path: 01-foundation/artifacts/recommendation/foundation-config-v1/metrics.json
  minimums:
    candidate_count: 1
    ratings_rows: 1
